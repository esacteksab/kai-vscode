---
changelog:
  exclude:
    labels:
      - ignore-changelog

  categories:
    - title: ":warning: Breaking changes"
      labels:
        - "type: breaking"
        - "type: deprecation"
        - "type: regression"
        - "type: revert"

    - title: ":sparkles: Theme updates"
      labels:
        - "type: theme"
        - "type: feat"
        - "type: enhancement"
        - "type: style"

    - title: ":lady_beetle: Bug fixes"
      labels:
        - "type: fix"

    - title: ":book: Documentation"
      labels:
        - "type: docs"

    - title: ":robot: CI and build"
      labels:
        - "type: ci"
        - "type: build"
        - "type: test"

    - title: ":dependabot: :clown_face: JavaScript dependency updates"
      labels:
        - "npm"

    - title: ":dependabot: :octocat: GitHub Actions dependency updates"
      labels:
        - "github_actions"

    - title: ":broom: Housekeeping"
      labels:
        - "type: task"
        - "type: chore"
        - "type: refactor"
        - "type: release"

    - title: ":package: Other changes"
      labels:
        - "type: misc"
        - "type: other"
        - "misc"
